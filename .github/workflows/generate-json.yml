name: Generate subjects.json from TXT files

on:
  push:
    paths:
      - '**/*.txt'
      - 'generate-json.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_PUSH }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate subjects.json
        run: node generate-json.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subjects.json
          git diff --staged --quiet || (git commit -m "🤖 Auto-generate subjects.json" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_PUSH }}
